<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>VPR Recruiting Activity</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --base: #0A1020;
    --panel: #121A2C;
    --line: rgba(255,255,255,.07);
    --line-soft: rgba(255,255,255,.05);
    --text: #EDF1FA;
    --muted: #939CB4;
    --faint: #626C86;
    --yellow: #FFDE17;
    --yellow-hi: #FFE85C;
    --blue: #4A6CF7;
    --blue-soft: #9DB2FF;
    --green: #34D399;
    --amber: #FBBF24;
    --red: #F87171;

    --card-grad: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.012));
    --card-shadow: inset 0 1px 0 rgba(255,255,255,.05), 0 18px 40px -24px rgba(0,0,0,.85);
    --radius: 16px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.45;
    min-height: 100vh;
    background:
      radial-gradient(1100px 560px at 72% -12%, rgba(74,108,247,.12), transparent 60%),
      radial-gradient(820px 460px at 2% -4%, rgba(255,222,23,.045), transparent 55%),
      var(--base);
    background-attachment: fixed;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 38px 22px 72px; }

  /* Header */
  header.bar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap; margin-bottom: 30px;
    padding-bottom: 22px; border-bottom: 1px solid var(--line-soft);
  }
  .brand { display: flex; align-items: center; gap: 13px; }
  .dot {
    width: 9px; height: 9px; border-radius: 50%; background: var(--green);
    box-shadow: 0 0 0 0 rgba(52,211,153,.55); animation: pulse 2.4s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(52,211,153,.5); }
    70%  { box-shadow: 0 0 0 10px rgba(52,211,153,0); }
    100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
  }
  .brand h1 { font-size: 18px; font-weight: 700; margin: 0; letter-spacing: -.2px; }
  .brand .sub { color: var(--muted); font-size: 12.5px; margin-top: 1px; }
  .right { display: flex; align-items: center; gap: 14px; }
  .updated { color: var(--faint); font-size: 12px; transition: color .2s ease; }
  button.refresh {
    background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
    color: var(--text); border: 1px solid rgba(255,255,255,.1);
    border-radius: 10px; padding: 9px 15px; font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    transition: border-color .18s, box-shadow .18s, transform .12s;
  }
  button.refresh:hover { border-color: rgba(74,108,247,.7); box-shadow: 0 0 0 3px rgba(74,108,247,.12); }
  button.refresh:active { transform: translateY(1px); }
  button.refresh:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
  button.refresh:disabled { opacity: .55; cursor: default; box-shadow: none; }

  /* KPIs */
  .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; align-items: stretch; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .stack > .kpi { flex: 1; }
  .kpi {
    position: relative; overflow: hidden;
    background: var(--card-grad), var(--panel);
    border: 1px solid var(--line); border-radius: var(--radius);
    padding: 20px 20px 18px; box-shadow: var(--card-shadow);
    transition: transform .16s ease, border-color .16s ease;
  }
  .kpi:hover { transform: translateY(-2px); border-color: rgba(255,255,255,.12); }
  .kpi .num {
    font-size: 42px; font-weight: 800; letter-spacing: -1.4px;
    font-variant-numeric: tabular-nums; line-height: 1; margin-top: 6px;
  }
  .kpi .lab {
    color: var(--muted); font-size: 11.5px; font-weight: 500;
    text-transform: uppercase; letter-spacing: .07em; margin-top: 12px;
  }

  /* Split (Form leads | Calls) + Scoreboard share a centered, divided layout */
  .kpi.split, .kpi.score { display: flex; align-items: stretch; padding: 0; }
  .kpi.split .half, .kpi.score .seg {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 18px 10px; text-align: center;
  }
  .vdiv { width: 1px; background: var(--line); align-self: stretch; margin: 16px 0; flex: none; }
  .kpi.split .num { margin-top: 0; }
  .kpi.split .half.accent .num {
    background: linear-gradient(180deg, var(--yellow-hi), var(--yellow));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .kpi.split .lab { margin-top: 10px; }

  .kpi.score .seg { position: relative; cursor: pointer; transition: background .15s ease; }
  .kpi.score .seg:hover { background: rgba(255,255,255,.03); }
  .kpi.score .seg:focus-visible { outline: 2px solid var(--blue); outline-offset: -2px; }
  .seg-num { font-size: 30px; font-weight: 800; letter-spacing: -1px; font-variant-numeric: tabular-nums; line-height: 1; color: var(--text); transition: color .15s ease; }
  .seg-lab { color: var(--muted); font-size: 10.5px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; margin-top: 9px; }
  .seg.active { background: rgba(255,255,255,.04); }
  .seg.active[data-status="captured"] { color: var(--blue-soft); }
  .seg.active[data-status="awaiting"] { color: var(--amber); }
  .seg.active[data-status="recruited"] { color: var(--green); }
  .seg.active .seg-num { color: currentColor; }
  .seg.active::before {
    content: ""; position: absolute; left: 16px; right: 16px; top: 0; height: 2px;
    background: currentColor; border-radius: 0 0 2px 2px;
  }

  /* Leads-by-source card */
  .kpi.source { padding: 18px 20px; }
  .src-head { display: flex; align-items: center; justify-content: space-between; }
  .src-title {
    color: var(--muted); font-size: 11.5px; font-weight: 500;
    text-transform: uppercase; letter-spacing: .07em;
  }
  .src-ico { color: var(--faint); opacity: .55; display: flex; }
  .src-ico svg { width: 18px; height: 18px; display: block; }
  .src-list { display: flex; flex-direction: column; gap: 7px; margin-top: 14px; }
  .src-list .loading, .src-list .src-empty { padding: 12px 2px; color: var(--faint); font-size: 13px; }
  .src-row {
    position: relative; display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 8px 12px; border-radius: 9px; overflow: hidden;
    background: rgba(255,255,255,.025); border: 1px solid var(--line-soft);
  }
  .src-bar {
    position: absolute; top: 0; bottom: 0; left: 0;
    background: linear-gradient(90deg, rgba(74,108,247,.22), rgba(74,108,247,.04));
    border-right: 1px solid rgba(74,108,247,.25);
  }
  .src-row.top .src-bar {
    background: linear-gradient(90deg, rgba(255,222,23,.18), rgba(255,222,23,.03));
    border-right-color: rgba(255,222,23,.32);
  }
  .src-name {
    position: relative; font-size: 13.5px; font-weight: 600; letter-spacing: -.1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  /* Per-source page breakdown (e.g. "4 Benefits · 1 Careers") */
  .src-split {
    position: relative; margin-left: auto; flex-shrink: 0;
    color: var(--faint); font-size: 11px; font-weight: 500;
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .src-count {
    position: relative; font-size: 16px; font-weight: 800;
    font-variant-numeric: tabular-nums; letter-spacing: -.3px;
  }
  .src-row.top .src-count { color: var(--yellow); }

  /* Panels */
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .panel {
    background: var(--card-grad), var(--panel);
    border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--card-shadow);
  }
  .panel > h2 {
    font-size: 12px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
    color: var(--muted); margin: 0; padding: 17px 20px 15px;
    border-bottom: 1px solid var(--line-soft);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel > h2 .count {
    color: var(--text); font-weight: 600; letter-spacing: 0; font-size: 12px;
    background: rgba(255,255,255,.07); border: 1px solid var(--line-soft);
    padding: 2px 9px; border-radius: 999px; min-width: 24px; text-align: center;
  }
  .list { display: flex; flex-direction: column; }

  /* Shared row layout: name + status on the left, time + source/outcome on the right */
  .item, .call-head {
    padding: 14px 20px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    transition: background .15s ease;
  }
  .item { border-bottom: 1px solid var(--line-soft); }
  .item:last-child { border-bottom: none; }
  .item:hover { background: rgba(255,255,255,.025); }

  .row-main { min-width: 0; }
  .row-main .who { font-weight: 600; font-size: 14.5px; letter-spacing: -.1px; }
  .row-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; text-align: right; }
  .row-right .when { color: var(--faint); font-size: 12px; white-space: nowrap; }
  .row-right .src { color: var(--text); font-size: 13px; font-weight: 600; white-space: nowrap; letter-spacing: -.1px; }
  .row-right .outcome { font-size: 12.5px; font-weight: 600; white-space: nowrap; }
  .row-right .outcome.answered { color: var(--green); }
  .row-right .outcome.missed { color: var(--amber); }
  .row-right .outcome.failed { color: var(--red); }
  .row-right .outcome.other { color: var(--muted); }

  /* Landing-page tag on lead rows (Channel × Page) */
  .page-tag {
    display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: .04em;
    padding: 2px 8px; border-radius: 999px; border: 1px solid transparent;
    text-transform: uppercase; white-space: nowrap;
  }
  .page-tag.benefits { background: rgba(74,108,247,.12); color: var(--blue-soft); border-color: rgba(74,108,247,.28); }
  .page-tag.careers  { background: rgba(255,222,23,.10); color: var(--yellow); border-color: rgba(255,222,23,.28); }
  .page-tag.otherpg  { background: rgba(147,156,180,.12); color: var(--muted); border-color: rgba(147,156,180,.22); }

  /* Status picker chip */
  .status-wrap { position: relative; display: inline-flex; margin-top: 8px; color: var(--faint); }
  .status-wrap::after {
    content: ""; position: absolute; right: 9px; top: 50%; width: 6px; height: 6px;
    border-right: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor;
    transform: translateY(-70%) rotate(45deg); pointer-events: none; opacity: .8;
  }
  .status-select {
    appearance: none; -webkit-appearance: none; font-family: inherit;
    font-size: 11px; font-weight: 600; letter-spacing: .03em; line-height: 1.4;
    padding: 3px 22px 3px 10px; border-radius: 999px; cursor: pointer;
    border: 1px solid transparent; transition: border-color .15s ease, background-color .15s ease;
  }
  .status-select:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
  .status-select:disabled { opacity: .5; cursor: default; }
  .status-select.st-captured { background-color: rgba(74,108,247,.13); color: var(--blue-soft); border-color: rgba(74,108,247,.30); }
  .status-select.st-awaiting { background-color: rgba(251,191,36,.13); color: var(--amber); border-color: rgba(251,191,36,.30); }
  .status-select.st-recruited { background-color: rgba(52,211,153,.13); color: var(--green); border-color: rgba(52,211,153,.30); }

  /* Expandable call rows */
  .call { border-bottom: 1px solid var(--line-soft); }
  .call:last-child { border-bottom: none; }
  .call-head { cursor: pointer; user-select: none; }
  .call-head:hover { background: rgba(255,255,255,.025); }
  .call-head:focus-visible { outline: 2px solid var(--blue); outline-offset: -2px; }
  .call.open > .call-head { background: rgba(255,255,255,.03); }
  .row-end { display: flex; align-items: flex-start; gap: 10px; flex-shrink: 0; }
  .chev { color: var(--faint); display: flex; margin-top: 1px; transition: transform .2s ease; }
  .chev svg { width: 16px; height: 16px; display: block; }
  .call.open .chev { transform: rotate(180deg); color: var(--muted); }

  .call-detail { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .22s ease; }
  .call.open .call-detail { grid-template-rows: 1fr; }
  .detail-inner { overflow: hidden; padding: 0 20px; }
  .call.open .detail-inner { padding: 2px 20px 16px; }
  .detail-row {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 7px 0; border-bottom: 1px solid var(--line-soft);
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row .dk { color: var(--faint); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }
  .detail-row .dv { color: var(--text); font-size: 13.5px; font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; }

  .pill {
    display: inline-block; font-size: 10.5px; font-weight: 600; letter-spacing: .03em;
    padding: 2.5px 9px; border-radius: 999px; border: 1px solid transparent;
  }
  .pill.answered { background: rgba(52,211,153,.12); color: var(--green); border-color: rgba(52,211,153,.25); }
  .pill.missed   { background: rgba(251,191,36,.12); color: var(--amber); border-color: rgba(251,191,36,.25); }
  .pill.failed   { background: rgba(248,113,113,.12); color: var(--red); border-color: rgba(248,113,113,.25); }
  .pill.other    { background: rgba(147,156,180,.13); color: var(--muted); border-color: rgba(147,156,180,.22); }

  .empty, .error { padding: 30px 20px; color: var(--muted); font-size: 13.5px; }
  .error { color: var(--amber); }
  .loading { padding: 30px 20px; color: var(--faint); font-size: 13.5px; }

  /* Entrance */
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .kpi, .panel { animation: rise .5s ease both; }
  .kpis > .kpi.source{ animation-delay: .03s; }
  .stack > .kpi:nth-child(1){ animation-delay: .08s; }
  .stack > .kpi:nth-child(2){ animation-delay: .13s; }
  .panels .panel:nth-child(1){ animation-delay: .22s; }
  .panels .panel:nth-child(2){ animation-delay: .27s; }

  @media (prefers-reduced-motion: reduce) {
    .dot { animation: none; }
    .kpi, .panel { animation: none; }
    .kpi:hover { transform: none; }
    .call-detail, .chev { transition: none; }
  }

  @media (max-width: 760px) {
    .wrap { padding: 26px 16px 56px; }
    .kpis { grid-template-columns: 1fr; }
    .panels { grid-template-columns: 1fr; }
    .kpi .num, .kpi.split .num { font-size: 34px; }
    .seg-num { font-size: 26px; }
    .src-split { display: none; } /* keep source rows readable on narrow screens */
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="bar">
      <div class="brand">
        <span class="dot" aria-hidden="true"></span>
        <div>
          <h1>VPR Recruiting Activity</h1>
          <div class="sub">Calls &amp; form leads from marketing — all-time</div>
        </div>
      </div>
      <div class="right">
        <span class="updated" id="updated"></span>
        <button class="refresh" id="refresh">Refresh</button>
      </div>
    </header>

    <section class="kpis" id="kpis">
      <div class="kpi source">
        <div class="src-head">
          <span class="src-title">Leads by source</span>
          <span class="src-ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="14"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="18" y1="20" x2="18" y2="10"/></svg></span>
        </div>
        <div class="src-list" id="src-list"><div class="loading">Loading…</div></div>
      </div>

      <div class="stack">
        <div class="kpi split">
          <div class="half accent">
            <div class="num" id="k-leads">—</div>
            <div class="lab">Form leads</div>
          </div>
          <div class="vdiv"></div>
          <div class="half">
            <div class="num" id="k-calls">—</div>
            <div class="lab">Calls</div>
          </div>
        </div>

        <div class="kpi score" id="score">
          <div class="seg" data-status="captured" role="button" tabindex="0" title="Filter by Captured">
            <div class="seg-num" id="sc-captured">0</div>
            <div class="seg-lab">Captured</div>
          </div>
          <div class="vdiv"></div>
          <div class="seg" data-status="awaiting" role="button" tabindex="0" title="Filter by Awaiting">
            <div class="seg-num" id="sc-awaiting">0</div>
            <div class="seg-lab">Awaiting</div>
          </div>
          <div class="vdiv"></div>
          <div class="seg" data-status="recruited" role="button" tabindex="0" title="Filter by Recruited">
            <div class="seg-num" id="sc-recruited">0</div>
            <div class="seg-lab">Recruited</div>
          </div>
        </div>
      </div>
    </section>

    <div class="panels">
      <div class="panel">
        <h2>Calls <span class="count" id="calls-count"></span></h2>
        <div class="list" id="calls"><div class="loading">Loading…</div></div>
      </div>
      <div class="panel">
        <h2>Form leads <span class="count" id="leads-count"></span></h2>
        <div class="list" id="leads"><div class="loading">Loading…</div></div>
      </div>
    </div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);

  const STATUSES = ["captured", "awaiting", "recruited"];
  const state = { calls: [], leads: [] };   // latest data from /api/data
  let activeFilter = null;                   // null | "captured" | "awaiting" | "recruited"
  const openCalls = new Set();               // remembers which call drawers are open across refreshes

  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

  function titleCase(s) {
    if (!s) return "";
    return s.toLowerCase().replace(/\b\w/g, (c) => c.toUpperCase());
  }

  function normStatus(s) {
    s = (s || "").toLowerCase().trim();
    return STATUSES.includes(s) ? s : "captured";
  }

  function formatPhone(raw) {
    if (!raw) return "";
    const d = String(raw).replace(/\D/g, "");
    const ten = d.length === 11 && d.startsWith("1") ? d.slice(1) : d;
    if (ten.length === 10) return `(${ten.slice(0,3)}) ${ten.slice(3,6)}-${ten.slice(6)}`;
    return String(raw);
  }

  function formatDuration(sec) {
    const s = Number(sec) || 0;
    if (s <= 0) return "—";
    const m = Math.floor(s / 60);
    const r = s % 60;
    return m > 0 ? `${m}m ${r}s` : `${r}s`;
  }

  function formatTime(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d)) return "";
    return d.toLocaleString("en-US", {
      month: "short", day: "numeric", hour: "numeric", minute: "2-digit",
    });
  }

  // completed = the call connected. Everything else = didn't connect.
  function callStatus(status) {
    switch ((status || "").toLowerCase()) {
      case "completed": return { cls: "answered", label: "Answered" };
      case "no-answer": return { cls: "missed",   label: "Missed" };
      case "busy":      return { cls: "missed",   label: "Busy" };
      case "canceled":  return { cls: "missed",   label: "Canceled" };
      case "failed":    return { cls: "failed",   label: "Failed" };
      case "initiated": return { cls: "other",    label: "In progress" };
      default:          return { cls: "other",    label: status || "—" };
    }
  }

  // Marketing source (channel) = utm_source only. The `source` column varies by
  // page (hard-coded "email_campaign" on vprbenefits, domain on vprcareers), so
  // it is ignored for channel purposes. Blank utm_source = "Direct".
  function leadSource(lead) {
    const s = (lead.utm_source || "").trim();
    return s ? titleCase(s) : "Direct";
  }

  // Landing page = derived from page_url, which every lead row has (works
  // retroactively on historical leads). Channel × Page: leadSource() answers
  // "where did they come FROM", leadPage() answers "where did they CONVERT".
  function leadPage(lead) {
    const u = (lead.page_url || "").toLowerCase();
    if (u.includes("vprbenefits")) return { key: "benefits", label: "Benefits" };
    if (u.includes("vprcareers"))  return { key: "careers",  label: "Careers" };
    if (!u) return null;
    try {
      const h = new URL(lead.page_url).hostname.replace(/^www\./, "");
      return h ? { key: "otherpg", label: h } : null;
    } catch (e) { return null; }
  }

  // Stable key per call so an open drawer survives the 60s auto-refresh.
  function callKey(c) {
    return c.call_sid || `${c.from_number || ""}|${c.started_at || ""}`;
  }

  // Pipeline counts across BOTH tables (always all-time, never filtered).
  function statusCounts() {
    const c = { captured: 0, awaiting: 0, recruited: 0 };
    state.leads.forEach((l) => { c[normStatus(l.lead_status)]++; });
    state.calls.forEach((x) => { c[normStatus(x.lead_status)]++; });
    return c;
  }

  // The Captured/Awaiting/Recruited picker for a row.
  function statusSelect(kind, id, current) {
    const cur = normStatus(current);
    const opts = STATUSES.map((s) =>
      `<option value="${s}"${s === cur ? " selected" : ""}>${cap(s)}</option>`
    ).join("");
    const dis = id ? "" : " disabled";
    return `<span class="status-wrap"><select class="status-select st-${cur}" data-kind="${kind}" data-id="${escapeHtml(id)}" data-status="${cur}" aria-label="Recruiting status"${dis}>${opts}</select></span>`;
  }

  function emptyMsg(noun) {
    return activeFilter ? `No ${cap(activeFilter)} ${noun}.` : `No ${noun} yet.`;
  }

  // Leads grouped by channel, biggest first, with a proportional bar and a
  // per-channel landing-page split (e.g. "4 Benefits · 1 Careers"). Always all-time.
  function renderSources(leads) {
    const el = $("src-list");
    if (!leads.length) { el.innerHTML = '<div class="src-empty">No leads yet.</div>'; return; }
    const counts = {}; // channel -> { n, pages: { label: count } }
    leads.forEach((l) => {
      const s = leadSource(l);
      if (!counts[s]) counts[s] = { n: 0, pages: {} };
      counts[s].n++;
      const p = leadPage(l);
      if (p) counts[s].pages[p.label] = (counts[s].pages[p.label] || 0) + 1;
    });
    const rows = Object.entries(counts).sort((a, b) => b[1].n - a[1].n);
    const max = rows[0][1].n || 1;
    el.innerHTML = rows.map(([name, data], i) => {
      const pct = Math.max(6, Math.round((data.n / max) * 100));
      const pageEntries = Object.entries(data.pages).sort((a, b) => b[1] - a[1]);
      // Only show the split when it adds information (more than one page in play
      // for this channel); a single-page channel just repeats the total.
      const split = pageEntries.length > 1
        ? `<span class="src-split">${pageEntries.map(([pl, pn]) => `${pn} ${escapeHtml(pl)}`).join(" · ")}</span>`
        : "";
      return `
        <div class="src-row${i === 0 ? " top" : ""}">
          <span class="src-bar" style="width:${pct}%"></span>
          <span class="src-name">${escapeHtml(name)}</span>
          ${split}
          <span class="src-count">${data.n}</span>
        </div>`;
    }).join("");
  }

  // Detail rows shown when a call is expanded. Optional fields appear only if present.
  function callDetail(c) {
    const st = callStatus(c.status);
    const rows = [["Status", st.label]];
    rows.push(["Talk time", st.cls === "answered" ? formatDuration(c.duration_seconds) : "Didn't connect"]);
    const phone = formatPhone(c.from_number);
    if (phone) rows.push(["Phone", phone]);
    const loc = [titleCase(c.from_city), c.from_state].filter(Boolean).join(", ");
    if (loc) rows.push(["Location", loc]);
    if (c.started_at) rows.push(["Started", formatTime(c.started_at)]);
    return rows.map(([k, v]) =>
      `<div class="detail-row"><span class="dk">${k}</span><span class="dv">${escapeHtml(String(v))}</span></div>`
    ).join("");
  }

  function renderCalls(calls) {
    const el = $("calls");
    $("calls-count").textContent = calls.length ? calls.length : "0";
    if (!calls.length) { el.innerHTML = `<div class="empty">${emptyMsg("calls")}</div>`; return; }
    el.innerHTML = calls.map((c, i) => {
      const name = c.from_caller_name && c.from_caller_name.trim()
        ? c.from_caller_name : (formatPhone(c.from_number) || "Unknown caller");
      const st = callStatus(c.status);
      let outcome = st.label;
      if (st.cls === "answered") outcome += " · " + formatDuration(c.duration_seconds);
      const key = callKey(c);
      const id = c.call_sid || "";
      return `
        <div class="call" data-key="${escapeHtml(key)}">
          <div class="call-head" role="button" tabindex="0" aria-expanded="false" aria-controls="cd-${i}">
            <div class="row-main">
              <div class="who">${escapeHtml(name)}</div>
              ${statusSelect("call", id, c.lead_status)}
            </div>
            <div class="row-end">
              <div class="row-right">
                <div class="when">${formatTime(c.started_at)}</div>
                <div class="outcome ${st.cls}">${escapeHtml(outcome)}</div>
              </div>
              <span class="chev" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
            </div>
          </div>
          <div class="call-detail" id="cd-${i}"><div class="detail-inner">${callDetail(c)}</div></div>
        </div>`;
    }).join("");

    el.querySelectorAll(".call").forEach((node) => {
      if (openCalls.has(node.dataset.key)) {
        node.classList.add("open");
        node.querySelector(".call-head").setAttribute("aria-expanded", "true");
      }
    });
  }

  function renderLeads(leads) {
    const el = $("leads");
    $("leads-count").textContent = leads.length ? leads.length : "0";
    if (!leads.length) { el.innerHTML = `<div class="empty">${emptyMsg("form leads")}</div>`; return; }
    el.innerHTML = leads.map((l) => {
      const name = [l.first_name, l.last_name].filter(Boolean).join(" ") || "—";
      const id = l.id || "";
      const p = leadPage(l);
      const pageTag = p ? `<span class="page-tag ${p.key}">${escapeHtml(p.label)}</span>` : "";
      return `
        <div class="item">
          <div class="row-main">
            <div class="who">${escapeHtml(name)}</div>
            ${statusSelect("lead", id, l.lead_status)}
          </div>
          <div class="row-right">
            <div class="when">${formatTime(l.created_at)}</div>
            <div class="src">${escapeHtml(leadSource(l))}</div>
            ${pageTag}
          </div>
        </div>`;
    }).join("");
  }

  // Single render pass: KPI totals, scoreboard, active highlight, filtered lists.
  function render() {
    $("k-leads").textContent = state.leads.length;
    $("k-calls").textContent = state.calls.length;

    const counts = statusCounts();
    STATUSES.forEach((s) => { $("sc-" + s).textContent = counts[s]; });

    document.querySelectorAll(".seg").forEach((seg) =>
      seg.classList.toggle("active", seg.dataset.status === activeFilter)
    );

    const fl = activeFilter ? state.leads.filter((l) => normStatus(l.lead_status) === activeFilter) : state.leads;
    const fc = activeFilter ? state.calls.filter((c) => normStatus(c.lead_status) === activeFilter) : state.calls;

    renderSources(state.leads);
    renderCalls(fc);
    renderLeads(fl);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
    ));
  }

  function showError(msg) {
    $("calls").innerHTML = `<div class="error">${escapeHtml(msg)}</div>`;
    $("leads").innerHTML = "";
    $("src-list").innerHTML = `<div class="src-empty">—</div>`;
  }

  function noteSaveError() {
    const u = $("updated");
    u.textContent = "Couldn't save status — try again";
    u.style.color = "var(--amber)";
    setTimeout(() => { u.style.color = ""; }, 4000);
  }

  function toggleCall(head) {
    const call = head.closest(".call");
    if (!call) return;
    const open = call.classList.toggle("open");
    head.setAttribute("aria-expanded", open ? "true" : "false");
    if (open) openCalls.add(call.dataset.key); else openCalls.delete(call.dataset.key);
  }

  // Update the in-memory row, then save to Supabase. Optimistic with rollback on failure.
  function applyStatusLocally(kind, id, status) {
    const arr = kind === "lead" ? state.leads : state.calls;
    const key = kind === "lead" ? "id" : "call_sid";
    const row = arr.find((r) => String(r[key]) === String(id));
    if (row) row.lead_status = status;
  }

  async function changeStatus(kind, id, status, prev) {
    applyStatusLocally(kind, id, status);
    render();
    try {
      const r = await fetch("/api/set-status", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ kind, id, status }),
      });
      if (!r.ok) throw new Error("save failed");
    } catch (e) {
      applyStatusLocally(kind, id, prev); // roll back
      render();
      noteSaveError();
    }
  }

  // --- Event wiring (bound once; containers persist across refreshes) ---

  // Status picker changes (works for both lists via delegation).
  document.addEventListener("change", (e) => {
    const sel = e.target.closest(".status-select");
    if (!sel) return;
    changeStatus(sel.dataset.kind, sel.dataset.id, sel.value, sel.dataset.status);
  });

  // Scoreboard filter clicks.
  function activateSeg(seg) {
    const s = seg.dataset.status;
    activeFilter = activeFilter === s ? null : s;
    render();
  }
  $("score").addEventListener("click", (e) => {
    const seg = e.target.closest(".seg");
    if (seg) activateSeg(seg);
  });
  $("score").addEventListener("keydown", (e) => {
    if (e.key !== "Enter" && e.key !== " ") return;
    const seg = e.target.closest(".seg");
    if (seg) { e.preventDefault(); activateSeg(seg); }
  });

  // Call drawer expand/collapse — but never when interacting with the status picker.
  $("calls").addEventListener("click", (e) => {
    if (e.target.closest(".status-wrap")) return;
    const head = e.target.closest(".call-head");
    if (head) toggleCall(head);
  });
  $("calls").addEventListener("keydown", (e) => {
    if (e.key !== "Enter" && e.key !== " ") return;
    if (e.target.closest(".status-wrap")) return;
    const head = e.target.closest(".call-head");
    if (head && e.target === head) { e.preventDefault(); toggleCall(head); }
  });

  async function load() {
    const btn = $("refresh");
    btn.disabled = true; btn.textContent = "Loading…";
    try {
      const r = await fetch("/api/data", { cache: "no-store" });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "Request failed");
      state.calls = data.calls || [];
      state.leads = data.leads || [];
      render();
      $("updated").textContent = "Updated " + new Date().toLocaleTimeString("en-US",
        { hour: "numeric", minute: "2-digit" });
    } catch (e) {
      showError("Couldn't load data. Check the API connection and refresh.");
    } finally {
      btn.disabled = false; btn.textContent = "Refresh";
    }
  }

  $("refresh").addEventListener("click", load);
  load();
  setInterval(load, 60000); // auto-refresh every minute
</script>
</body>
</html>
